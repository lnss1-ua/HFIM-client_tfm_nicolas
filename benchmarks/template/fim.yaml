# FIM Benchmark Configuration
#
# This file tells FIM which variables to check for Silent Data Corruption.
# Types and sizes are auto-detected from the compiled ELF (built with -g).

# Observable variables for SDC detection
# FIM reads these via GDB after each injection and compares to the golden run
observable_outputs:
  comparison: "exact"      # "exact" or "tolerance"
  variables:
    - name: "result"       # Must be global volatile in your code
    # - name: "other_var"
    # - name: "float_var"
    #   tolerance: 0.001   # For tolerance comparison mode

# Uncomment for serial feeder benchmarks (e.g., robot arm with PyBullet)
# serial_pty: true
# serial_feeder_cmd: "python3 {benchmark_dir}/feeder.py --pty {pty}"

# Uncomment to override default timeout (auto-calculated from golden run)
# timeout: 60

# Fault type (default: register). One campaign injects one fault type;
# to run several, use a batch file (one entry each). See docs/.
# fault: register

# Memory faults: pick a whole ELF section with `section:` ...
# fault: memory
# section: .bss            # .bss, .data, .rodata, ...

# ... or an explicit address range instead of a section:
# fault: memory
# memory_start: "0x80001000"
# memory_end:   "0x80002000"

# gem5-only targets (cache, dram, microarchitecture) use the same `fault:`
# key, e.g. `fault: cache_l1d` with `--simulator gem5`. See docs/gem5-targets.md.
