# FIM config -- robot arm PID controller
# Requires serial PTY feeder (PyBullet simulator)
#
# MODO: breakpoint en el marcador fim_breakpoint() (config 06, recompile-stable).
# El benchmark coloca fim_breakpoint() justo antes del calculo del PID (main.c).
# En modo breakpoint, la campana resuelve ese simbolo automaticamente y para el
# PC ahi -- no hace falta inject_at_symbol/inject_at_offset.
#
# Por que no el histograma de ventana W4: el bucle de espera UART del feeder
# (uart_getc) ejecuta decenas de miles de veces dentro de [fim_init, fim_exit],
# y su trip count NO es reproducible run-to-run (depende del timing del feeder).
# Un sorteo ponderado por trip count cae sobre ese spin, no sobre la matematica
# de control. El marcador puntual lo evita.
#
# Por que no main+0x96: ese offset de bytes se mueve si se recompila main.c.
# El simbolo fim_breakpoint sobrevive la recompilacion.
timeout: 120

injection_mode: breakpoint

observable_outputs:
  comparison: "exact"
  variables:
    - name: "tau"
      type: "float[4]"
    - name: "posicion"
      type: "float[4]"
    - name: "target_position"
      type: "float[4]"
    - name: "loop_count"
      type: "int"

# El PID corre en los registros float (la C906 tiene F/D y la ABI es double).
# La lista de registros enteros por defecto del servidor para --fault register
# deja ~95% de inyecciones en registros enteros ociosos -> MASKED. Ampliamos
# a los f-registros donde vive de verdad el calculo del PID.
target_registers:
  # Integer ABI (control flow, loop counter, addresses)
  - a0
  - a1
  - a2
  - a3
  - a4
  - a5
  - s0
  - s1
  - s2
  - s3
  - t0
  - t1
  - t2
  # Float ABI -- where the PID math actually lives
  - fa0
  - fa1
  - fa2
  - fa3
  - fa4
  - fa5
  - fa6
  - fa7
  - fs0
  - fs1
  - fs2
  - fs3
  - ft0
  - ft1
  - ft2
  - ft3
  - ft4
  - ft5

serial_pty: true
serial_feeder_cmd: "python3 {benchmark_dir}/simulador_enrique/pybullet_feeder.py --pty {pty} --trajectory-log {injection_outdir}/trajectory.csv"
