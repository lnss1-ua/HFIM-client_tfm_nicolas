# FIM config -- robot arm PID controller
# Requires serial PTY feeder (PyBullet simulator)
timeout: 120

injection_mode: breakpoint

target_types: [memory]
section: .bss
memory_access_size: 4
fault_model: single_bit_flip

observable_outputs:
  comparison: "exact"
  variables:
    - name: "tau"
      type: "float[4]"
    - name: "posicion"
      type: "float[4]"
    - name: "target_position"
      type: "float[4]"
    - name: "loop_count"
      type: "int"

#target_registers: auto
#include_int: true
#include_float: true

serial_pty: true
serial_feeder_cmd: "python3 {benchmark_dir}/simulador_enrique/pybullet_feeder.py --pty {pty} --trajectory-log {injection_outdir}/trajectory.csv"
